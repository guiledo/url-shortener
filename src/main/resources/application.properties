spring.application.name=url-shortener

# Database connection
# NOTE: Render sets DATABASE_URL in postgresql:// format, which is not directly compatible with JDBC.
# For Spring Boot, configure Render with SPRING_DATASOURCE_URL (jdbc:postgresql://...), POSTGRES_USER, and POSTGRES_PASSWORD.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/url_shortener}
spring.datasource.username=${POSTGRES_USER:user}
spring.datasource.password=${POSTGRES_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
# update is safe here because it will not drop tables, but will create if missing.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server Port (Render uses PORT env variable)
server.port=${PORT:8080}

# Frontend URL for CORS and redirects
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
