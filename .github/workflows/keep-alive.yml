name: Keep Alive Render and Supabase

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Server
        run: curl -s https://url-shortener-knyo.onrender.com/api/health
        
      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
        
      - name: Ping Supabase Database
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is not set, skipping database ping..."
            exit 0
          fi
          echo "Pinging database to keep it alive..."
          psql "$DATABASE_URL" -c "SELECT 1;"
